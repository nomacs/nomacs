name: macOS workflow
on: 
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: macos-13
    name: build (Qt${{ matrix.qt.ver }}, ${{ matrix.config.type }}, ${{ matrix.arch.type }})
    strategy:
      matrix:
        qt: 
          - ver: 6
            packages: "qt6"
        config:
          - type: default
            packages: cmake pkg-config googletest exiv2 quazip libraw opencv
            flags: "-DENABLE_QUAZIP=ON"
          - type: minimum
            packages: cmake pkg-config googletest exiv2
            flags: "-DENABLE_PLUGINS=OFF -DENABLE_OPENCV=OFF -DENABLE_RAW=OFF -DENABLE_TIFF=OFF -DENABLE_QUAZIP=OFF"
        arch:
          - type: intel
            flags:

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install build dependencies
        run: |
          brew install ${{ matrix.qt.packages }} ${{ matrix.config.packages }}

      - name: Checkout submodules
        run: |
          cd ${GITHUB_WORKSPACE}
          git submodule init
          git submodule update 3rd-party/imageformats ImageLounge/plugins

      - name: CMake configure
        run: |
          mkdir ${GITHUB_WORKSPACE}/build
          cd ${GITHUB_WORKSPACE}/build
          cmake ${{ matrix.config.flags }} ../ImageLounge

      - name: Build
        run: |
          cd ${GITHUB_WORKSPACE}/build
          make -j4

      - name: Test
        run: |
          cd ${GITHUB_WORKSPACE}/build
          make check

      - name: kimageformats
        if: matrix.qt.ver == '6' && matrix.config.type == 'default'
        run: |
          cd ${GITHUB_WORKSPACE}/build
          make kimageformats

      - name: Bundle
        if: matrix.qt.ver == '6' && matrix.config.type == 'default'
        run: |
          cd ${GITHUB_WORKSPACE}/build
          make bundle

      - name: Upload artifact
        if: matrix.qt.ver == '6' && matrix.config.type == 'default'
        uses: actions/upload-artifact@v4
        with:
          name: big-data
          path: build/nomacs.dmg
          retention-days: 30
